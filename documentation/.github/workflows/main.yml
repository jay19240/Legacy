name: arcadegpu-doc

on: # specify the build to trigger the automated ci/cd
  push:
    branches:
      - "main"
jobs:
  build:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v1
    - name: Install node
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
    - name: Install dependencies
      run: npm install
    - name: Run tests
      run: node index.js